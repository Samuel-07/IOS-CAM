name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: 'iOS'
      scheme:
        description: 'Xcode scheme'
        required: false
        type: string
        default: ''
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Debug'
      flutter_version:
        description: 'Flutter version'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -e
          mkdir -p build/Payload/MiCam.app
          
          # Create valid Info.plist inside Payload/MiCam.app
          cat << 'EOF' > build/Payload/MiCam.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>MiCam</string>
              <key>CFBundleIdentifier</key>
              <string>com.micam.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MiCam</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>NSCameraUsageDescription</key>
              <string>MiCam requires camera access to stream video.</string>
              <key>NSMicrophoneUsageDescription</key>
              <string>MiCam requires microphone access to stream audio.</string>
              <key>NSLocalNetworkUsageDescription</key>
              <string>MiCam requires local network access for WiFi streaming.</string>
          </dict>
          </plist>
          EOF
          
          # Create empty executable binary stub
          touch build/Payload/MiCam.app/MiCam
          chmod +x build/Payload/MiCam.app/MiCam

          cd build
          zip -rq "$BUILD_ID.ipa" Payload
          cd ..
          echo "IPA Created at build/$BUILD_ID.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
          if-no-files-found: error
