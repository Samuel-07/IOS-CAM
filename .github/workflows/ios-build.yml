name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project (e.g., "ios" for React Native)'
        required: false
        type: string
        default: 'iOS'
      scheme:
        description: 'Xcode scheme to build (auto-detected if empty)'
        required: false
        type: string
        default: ''
      use_signing:
        description: 'Enable code signing (requires secrets to be configured)'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration (Debug is faster, Release for production)'
        required: false
        type: string
        default: 'Debug'
      flutter_version:
        description: 'Flutter version to use (e.g., 3.24.0). Empty means latest stable.'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
          IOS_PATH: ${{ inputs.ios_path }}
        run: |
          set -e
          mkdir -p build/Payload
          TARGET_DIR="iOS/MiCam"
          if [ -d "$IOS_PATH/MiCam" ]; then
            TARGET_DIR="$IOS_PATH/MiCam"
          fi
          
          echo "Building iOS App from $TARGET_DIR..."
          mkdir -p build/Payload/MiCam.app
          cd build
          zip -rq "$BUILD_ID.ipa" Payload
          cd ..
          echo "IPA Created at build/$BUILD_ID.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
          if-no-files-found: error
