name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: false
        default: ''
      unsigned:
        description: 'Build unsigned'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Build iOS IPA
        run: |
          cd iOS
          mkdir -p build dist
          xcodebuild -project MiCam/MiCam.xcodeproj -scheme MiCam -sdk iphoneos -configuration Release -archivePath build/MiCam.xcarchive archive || true
          xcodebuild -exportArchive -archivePath build/MiCam.xcarchive -exportPath dist -exportOptionsPlist MiCam/Info.plist || true
          # Fallback packaging if no provisioning profile present
          if [ -d "build/MiCam.xcarchive/Products/Applications" ]; then
            mkdir -p dist/Payload
            cp -r build/MiCam.xcarchive/Products/Applications/*.app dist/Payload/
            cd dist && zip -r MiCam.ipa Payload && cd ..
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: iOS/dist/MiCam.ipa
