name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: 'iOS'
      scheme:
        description: 'Xcode scheme'
        required: false
        type: string
        default: ''
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Release'
      flutter_version:
        description: 'Flutter version'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compile Native Swift ARM64 Mach-O Binary & Package IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -e
          rm -rf build/Payload build/*.ipa
          mkdir -p build/Payload/MiCam.app
          
          # Copy Info.plist
          cp iOS/MiCam/Info.plist build/Payload/MiCam.app/Info.plist

          # Compile Swift source files directly into native ARM64 Mach-O executable
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "Compiling native ARM64 Mach-O binary using SDK at $SDK_PATH..."
          
          xcrun swiftc -sdk "$SDK_PATH" \
                       -target arm64-apple-ios15.0 \
                       -emit-executable \
                       -o build/Payload/MiCam.app/MiCam \
                       iOS/MiCam/Shared/Protocol.swift \
                       iOS/MiCam/Core/CameraManager.swift \
                       iOS/MiCam/Core/VideoEncoder.swift \
                       iOS/MiCam/Network/NetworkStreamer.swift \
                       iOS/MiCam/UI/ContentView.swift \
                       iOS/MiCam/App/MiCamApp.swift

          chmod +x build/Payload/MiCam.app/MiCam
          echo "Mach-O binary created successfully:"
          file build/Payload/MiCam.app/MiCam

          cd build
          zip -rq "MiCam-Pro.ipa" Payload
          cd ..
          echo "Mach-O IPA created at build/MiCam-Pro.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/MiCam-Pro.ipa
          retention-days: 7
          if-no-files-found: error
